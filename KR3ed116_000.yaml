front:
  text: 序物何靈人為靈靈何寄寄一耳耳也者自後天而紐合先天者也先天以靈明為主後天以血氣為用用不流行則靈明且為之窒塞用是軒岐家閔焉以為先天不立皆由後天失用之故血氣者得正平則得用失正平則失用由失用而返之得用非藉瓊芝瑤草不可而瓊芝瑤草又非人間可以猝得不得已而思其次有借樹根草皮為生活計者夫樹根草皮得天地之靈秀而毓只是一樹根一性味一草皮一性味不善用之非失之剛即失之柔善用之則剛者濟之以柔柔者濟之以剛有不得正平而與彼更生者未之前聞也作是說於萍翠山房山房中有客聞而善之曰然則如何而可得正平之良劑乎予曰是不難語云藥雖出於醫手方多傳於古人只取軒岐家已經經驗於世者遍告同人豈不一舉而萬善駢臻客即應聲曰是是於是向絳囊中取撮要一冊以授客客受而懷之懷之也何居曰將以問世也即付之梓是為序乾隆九年歲次甲子仲夏之月十有三日云川道人識
