圍癰疽腫痛大小一切外症白芨八錢黃柏四錢大黃四錢薑黃三錢南星四錢東丹五錢礬紅二錢土貝四錢血竭一錢共為細末用井水調敷留頭火紙摘碎蓋上干則連紙自落再敷不必水洗並不可用天落水調又方芙蓉花或葉或根皮或生搗或乾研和白蜜調塗四圍中留頭干則頻易當歸膏專治發背癰疽湯火傷去腐生新其肉搽至漸白方始毒盡如外肉焮干爬連好肉皴揭作痛用之即愈並治一切濕毒臁瘡頭面疳瘡膿窠瘡毒小兒胎毒瘡癩凡腐爛不堪之症無不效驗當歸一兩大生地一兩黃蠟五錢白蠟五錢真麻油五兩先將當歸生地浸油內一宿煎至枯浮用絹濾去渣次以黃白蠟入油熬化攪勻成膏瓷罐收貯用黎洞膏治癰疽初起及熱癤瘰癧俱效並治痄腮發頤一切風毒之症象貝一兩穿山甲二兩五錢川貝一兩去心紫花地丁一兩蒲公英二兩生甘草一兩五錢赤苓一兩川萆薢二兩稀薟草一兩五錢苦參三兩陳橘核五錢用大麻油浸煎熬成膏以東丹酌收油紙照症攤貼神效氣毒流注未潰方蔥白不拘多少搗爛堆患處以熨斗火隔紙運之愈松香膏治瘰癧結核已穿未穿俱效白嫩松香熔化置生布內絞去渣入水杓內頓滾扯拔至鬆脆為度淨末一兩蓖麻子肉五錢研爛銅綠一錢麝香一分杵和攤貼內服犀黃丸愈犀黃丸治乳岩瘰癧痰核流注橫痃肺癰小腸癰一切腐潰陰疽神效乳香沒藥各一兩麝香一錢五分犀黃三分共為細末取黃米飯一兩搗爛研和為丸如卜子大曬乾忌烘每服二錢熱陳酒送下患生下部空心服上部臨臥服附制乳香沒藥法每藥一斤用燈草心四兩摘寸段同炒至圓脆可粉為度扇去燈心磨粉用替針丸追膿去腐止痛雄麻雀屎乳香去油沒藥去油各三分為末飛面丸黍米大曬乾用利針撥破瘡頭黏上膏藥蓋之即破神效生肌散乳香沒藥血竭兒茶各一錢珍珠龍骨各五分冰片象皮各三分為極細末貯瓶塞口用加味太乙膏治一切瘡口不收貼之生肌長肉香麻油一斤當歸二兩生地一兩生甘草一兩三味入油內熬枯以絲綿濾去渣再入淨鍋煎熬至滴水不散入炒飛黃丹八兩又慢火熬滴水成珠取起少頃再入白蠟黃蠟各一兩微火再煎離火少定入乳香沒藥去油各五錢攪勻出火攤貼生肌紅玉膏治一切瘡不收口用之呼膿長肉外科聖藥也白芷五錢歸身二兩紫草二錢粉草一兩二錢血竭四錢白蠟二兩真麻油一斤先以前四味入油內浸三日慢火熬藥枯黑去渣入銅杓內煎滾下血竭化盡次下白蠟亦化盡傾入碗內候少頃將研細輕粉一錢投下攪勻用時將抿子腳挑藥搽肉上外以太乙膏貼之治瘡成管方大蒜硬梗燒灰存性研搽患處其管自消或覓梅樹上簑衣蟲炙灰存性研末搽之亦消翠霞錠子治年深冷漏日久惡瘡有歹肉用之銅綠寒水石煅滑石各三錢明礬膩粉砒霜雲母石各一錢二分五釐上研細末糊為錠子如席草粗量瘡口深淺紝之修合宜擇晴天治疔毒初起方人中白少許益母草連莖葉炙存性為末先用銀刀十字劃開去惡血摻末在內其根自出可保無虞重者連上五六次諸毒可拔不特此也又方不拘何疔雖已走黃但看心頭未滿者可治用遠年糞坑內黑磚幾塊帶水磨細同甘草煎濃收去渣服服後用淨桶一隻候解出黑水即愈又方用水煤研細酒調服服後照前用淨桶候解毒水立愈解後用稀粥湯調補真治急神方也拔疔方地鱉蟲一個以濕草紙包數重瓦上炙俟草紙成灰剝出研末黑糖油調敷依根盤圍起圍至疔邊空出疔頭兩個時辰其疔自出菊花酒治疔毒惡瘡小水不利白菊花連根莖葉搗爛入微水絞汁熱酒溫服渣敷患處即止疼消腫治指上蛇頭疔方干蜈蚣一條瓦上焙酒漿滴七次焦枯連瓦放地上至脆為末加雄黃一錢雞蛋一個挖孔去黃留白將藥末入蛋內指套蛋中薄綿紙蘸麵糊塞滿空處使不走氣一周時效痛極者一日換四五次即效治紅絲疔方手足間有黃泡即起紅絲一條走入心腹令人悶亂不救皆因大喜大怒氣血逆行所致急用銀針或碗鋒於紅絲所到處挑透擠出惡血再細嚼浮萍草敷之立愈散疔膏專敷一切疔毒紅絲疔蛇頭疔及諸疽毒其效如神的乳香沒藥真血竭人言兒茶各二錢飛淨青黛蟾酥象皮瓦焙各一錢當門子六分梅花冰片四分上藥各秤准為細末用大棗十餘枚去皮核和藥入乳缽內石捶打極勻為丸如芡實大另研極細飛過硃砂二錢為衣瓷罐收貯勿令泄氣每用一丸加白蜜少許調和極勻塗於毒頂以綿紙蓋之一宿全消如毒盛未盡明日再塗一次如有因寒熱口渴便秘等症再服梅花點舌丹一丸蓋暖取汗無不應手而愈梅花點舌丹治一切疔毒惡瘡初起天行瘟毒咽喉腫痛等症梅花冰片五分明雄黃七分當門子五分乳香去油沒藥去油飛淨硃砂硼砂各一錢真西黃血竭沉香末蟾酥火酒化開和藥葶藶各七分熊膽五分珍珠淨末四分上藥各研極細無聲並用無病人乳汁和搗再入蟾酥搗至極勻丸如麻子大外用金箔為衣凡用一丸含於舌底不住運動否則舌下起泡待藥化完臨臥再以溫酒送下一丸被蓋暖俟汗出即愈鳳仙膏治癰疽發背杖瘡蛇傷鳳仙花連根莖葉搗爛敷患處一日一換懸癰飲在肛門前陰根後交界處初起如松子大漸如蓮子粗十日後如桃李樣此方治之甚效甘草金銀花酒炒等分濃煎空心服或即將此二味煎膏晨用開水點服更妙紫蘇散治腎子爛出蘇葉焙乾老杉木燒灰等分為末敷干以香油調敷如囊無皮爛出者以蘇葉或荷葉包通仙五寶散治楊梅結毒此方古今第一鐘乳石三分硃砂琥珀冰片各五釐珍珠二分入炒飛面分半勻十二服每日用土茯苓一斤水煎十二碗清晨一碗入藥一服溫服其茯苓湯一日服盡不可別飲湯水及茶明日再煎湯如法服重者再服一料無不愈者忌酒色葷辣諸物紫金丹治楊梅結毒疼痛腐爛甚至咽喉唇鼻破壞不拘久近神效龜板酒炙三次焦黃二兩石決明煅紅童便淬硃砂各二錢為末爛米飯丸如麻子大每服一錢量病上下食前後服之筋骨疼痛酒下腐爛土茯苓湯下至重者四十日愈魚口便毒左為魚口右為便毒生於兩胯合縫之間結腫是也近之生於小腹之下陰毛之傍結腫名曰橫痃又名曰外疝治宜散滯行瘀通利大小二便如口潰則大溫補之不然恐生別症栝蔞燒存性為末黃酒下此治魚口初起便毒奇方地榆四兩川通草一兩白酒三碗煎一碗空心服愈橫痃神方雞蛋一個白蒺藜一合好酒煮蛋熟去殼服立愈內消方治痔神效黃芩五錢苦參六錢防己五錢天花粉五錢連翹五錢水二大鐘煎八分初起者服即見功治痔方老甘草一斤青鹽半斤為末水泛丸桐子大每朝服三四錢即愈洗痔湯治肛門腫痛下墜無論新久痛止腫消枳殼天名精各二兩一名地菘以河水三瓢煎數滾先熏後洗甚者三次即愈護痔膏用此藥圍護四邊好肉方上枯痔散白芨石膏黃連各三錢冰片麝香各三分研末雞蛋白調成膏塗好肉上枯痔散自有此藥世上斷無不愈之痔真神方也紅砒不拘多少放舊瓦上火煅白煙將盡取起枯礬各一錢烏梅燒存性二錢研極細末用時以口津濕手蘸藥於痔身痔頭上搓捻一日二次初敷不腫五六日出臭水盡其痔乾枯不用上藥輕者七八日全愈重者半月收功治管漏方象牙屑焙黃為末每早用熱雞蛋三個蘸食五六錢或入稀粥內吃約服二斤自愈又方用田螺大者煅灰存性入冰片少許塗之治管中有蟲癢極神方白楊樹皮白楝樹皮煎湯入新淨桶內坐上熏蟲即出甘草蜜治陰頭生瘡甘草為末白蜜調敷愈合掌散專治癩疥陰囊瘡效方硫黃一兩鐵鏽一錢紅砒六分共研極細如面取蔥汁調和塗入粗大碗內勿使厚薄以碗覆於瓦上取艾置碗下熏藥藥得熏干敲藥碗聲同空碗無異為度取藥再研極細每遇滿身疥瘡及繡球風用藥一錢可敷數次全愈臨用以右手中指羅門黏滿香油然後蘸藥塗入左手心合掌而摩只有藥氣不見藥形將兩手擦瘡每日早晚擦二次三日掃光再擦三四日不發洗瘡方不論膿窠癩疥俱效白果樹葉不拘多少先在石臼內搗爛煎濃湯浴洗重者五六次即愈瘡藥方治癩疥膿窠俱效大蜈蚣二條白苦參二兩川萆薢一兩五錢白歸身一兩穿山甲一兩金銀花三兩生白朮二兩土貝母二兩生甘草二兩生香附一兩大麻油一斤煎膏加入小麻油三兩調和擦搽周身愈治癬蟲方川槿皮肥皂水浸時時搽之或浸汁磨雄黃尤妙又方白芨切片焙槿皮炒各等分為末陳醋調先放飯鍋上蒸熟厚塗黏肌難脫淨去隨愈白禿瘡方松香三兩蔥汁煮白白芷二兩川椒一兩東丹一兩枯礬一兩為末菜油調搽黃香油治禿瘡肥瘡松香一兩雄黃一兩為末放竹紙上捲成條子用菜油浸一宿取出倒吊燒之用一粗碗盛滴下之油搽上立愈獨聖膏治臁瘡妙方煅過爐甘石不拘多少豬骨髓油調搽凡敷藥先以防風荊芥銀花甘草湯洗淨然後敷之治濕毒臁瘡方石膏一兩五錢黃柏一兩半夏一兩赤石脂五錢枯白礬二錢緋丹二錢共為末摻如裙風濕毒痛癢者更效爛腿瘡膏方陳棕櫚皮生甘草粉生地榆川萆薢青木香各一兩青防風黃柏末稀薟草細生地各二兩側柏葉一兩五錢蛇殼一條五倍子屑五錢用大麻油浸煎如法用飛丹收成膏油紙攤貼治蟻漏驗方生項頸間刺破水出不能收口緣食物中偶食蟻故患之穿山甲燒存性為末敷之立愈乾用豬脂調敷蟻入耳中穿山甲燒研水調灌入治粉渣瘤方天花粉一兩東壁土五錢穿山甲三錢川貝母三錢去心為末和勻摻現成太乙膏上貼之即穿出渣而愈治癭瘤初起方櫻桃核醋磨敷之消二黃散治坐板瘡屢效大黃黃柏為末入豬油共搗勻搽即愈蟹黃散治漆瘡聖藥蟹黃曬乾同滑石研末白蜜調塗先以老杉木屑煎湯洗治凍瘡方生薑不拘多少搗絞汁銅杓內熬濃塗患處覺熱辣難當愈地榆散治湯火傷拂上立刻即愈生地榆曬乾為末香油調敷破爛者干搽傷重者再用生蘿蔔搗汁一碗灌下良久愈蛇纏腰方牛膝一兩黃柏五錢知母五錢水酒煎服效白蛇纏方白芨八錢水龍骨糞舡板上者佳研末水調搽螃蟹酒治渾身打傷並治接骨生螃蟹大者一隻小者三隻石臼內搗碎滾黃酒沖服其渣罨傷處骨內谷谷有聲其骨自接即打傷者一夜即愈土鱉酒治傷接骨神方地鱉蟲十餘個生搗絞汁用滾黃酒沖服效止血散金槍第一方陳石灰八兩大黃四兩切片同炒至石灰桃花色去大黃碾細收貯遇傷敷上即時止血蓖麻膏治竹木入肉蓖麻子搗塗痛止即出出即洗去治刀斧傷血不止方紫降香瓷瓦鐮刮下石碾研細忌鐵敷上即止又無瘢痕又方天南星血竭等分研細末敷即止爛腳丫方白蔻仁砂仁澤瀉各三錢研極細末撒患處愈先用甘草煎湯洗淨又方爛甚發腫作膿寸步難行者蒼朮一錢枯白礬五分小川連五分生甘草三分焙乾研極細末加入冰片一分先用甘草煎湯洗淨患處將新棉花蘸藥末些少摻上一日三次愈瘋狗咬方急於無風處取出惡血如無血以針刺出血小便洗淨外用香油調雄黃少加麝香敷或即以麻油調百草霜敷再用番木鱉半斤切碎糯米一撮斑蝥七個去頭翅足若過一日加一個三樣以緩火同炒至米出煙為度去木鱉斑蝥取米研末冷水入麻油少許調服以二便利下惡物為度多日勢凶猛者頭上有紅髮三根拔出去之如仍凶腹內有狗聲者再加木鱉一個斑蝥廿一個如前法制取米調服後以黃連甘草湯解之百日不可聽鑼鼓聲終身不可食牛犬肉及近苧麻之地犯之再發則不治又方用斑蝥七個去頭翅足糯米四十九粒同炒揀去斑蝥將米研末黃酒調服毒從