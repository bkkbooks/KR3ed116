body:
  text: 內科牛膽星丸治一切厥逆猝不省事口流涎沫手足拳攣諸症陳極牛膽星一兩五錢天竺黃一兩白芥子五錢香犀角尖一兩羚羊角尖一兩金箔三十頁生龍齒七錢辰砂三錢共為細末用陳米飲湯為丸如椒目大每服二十一粒老弱減去十粒用開水送牛黃清心丸專治痰厥昏暈不醒口噤痰喘及小兒驚風發搐五癇等症陳膽星一兩薑汁炒白附子一兩煨鬱金五錢川烏一兩面包煨半夏一兩皂莢湯泡五次礬湯泡一次皮硝湯泡五次曬乾為末上五味研細用臘月黃牛膽三個取汁和藥仍入膽內扎口掛風檐下次年取膽內藥每藥一兩四錢重加度過芒硝水飛辰砂硼砂各一錢冰片麝香各一分照分配就研極細末稀糊為丸如黃豆大金箔為衣薑湯化下附合牛膽星法臘月用黃牛膽取出汁配入天南星川貝母等分極細末將汁拌勻仍入膽殼內扎口掛風檐下次年再覓牛膽將前膽殼內藥研拌汁仍裝入扎口掛檐下如是做二三年後常掛檐下越陳越好合後須防天暖汁臭有志濟世者可多備應用凡牛膽圓者黃牛茄子式者水牛艾灸法治一切中風中痰中寒中惡神驗無比將兩手中指對合以繩縛定用艾丸灸兩指中間三四壯即愈再灸百會穴在頭頂中心中脘穴臍上四寸氣海穴臍下一寸五分凡灸取寸法量男左女右手中指中一節橫紋處為一寸吳茱萸熨治陰毒傷寒四肢逆冷吳茱萸一升酒拌濕絹袋二個分貯包蒸極熱互熨心胸及足心候氣透痛即止蔥姜熨治傷寒結胸蔥姜不拘多少搗爛炒熱布包頻換熨胸甚效七鮮湯治時疾厥逆鮮藿香一錢五分鮮首烏一錢五分鮮荷葉邊三錢鮮生地五錢鮮佩蘭葉一錢五分鮮建蘭葉七瓣鮮水梨七錢連皮上藥和勻打汁濾清用溫開水沖服辰砂益元散治一切中暑熱之聖藥滑石六錢水飛生甘草一錢辰砂五分研極細末用冷水或冷鮮藿香湯調服即安四汁散治痰火天花粉一斤用梨汁薑汁蘿蔔汁竹瀝各一鍾次第拌曬乾為末每服一錢好茶下咳嗽神方桔梗六分川貝母一錢白菊花七朵水梨肉五錢連皮日泡湯服即愈痰哮方川楝子一兩江枳實五錢制香附一兩生牡蠣七錢生地慄一兩方青鹽三錢水泛為丸每朝開水送三四錢治瘧方真川貝母六錢去心研極細末半夏四錢研細末炒微黃須於五月五日午時虔合瓷瓶收貯每服一分五釐薑汁兩三匙拌隔水燉熱瘧來前一時服重者兩服忌食芋艿南瓜雞鴨蛋等發物百日三日瘧方鱉甲炙灰青蒿等分每服三錢或酒或茶清晨送下治瘧初起方平胃消痰理氣除濕輕者二三劑即愈如稍減未全愈接服第二方陳皮一錢五分半夏一錢五分礬制茯苓一錢五分威靈仙一錢五分蒼朮一錢二分米汁浸厚朴一錢二分薑製柴胡一錢黃芩一錢二分青皮一錢檳榔八分炙甘草五分加姜三片井水河水對半煎服如頭痛加白芷一錢第二方虛實得宜即極弱之人數劑後即愈何首烏四錢生用廣皮一錢柴胡八分茯苓黃芩白朮炒威靈仙鱉甲各一錢五分當歸一錢知母二錢炙甘草六分加姜三片井水河水各半煎滾加酒半鍾再煎滾服治白痢方橘餅一隻切碎黃糖三錢普洱茶一兩水姜五錢白糖三錢煎湯當茶服愈紅痢不宜參香丸治紅白痢極效苦參六錢木香四錢忌火甘草五錢為末飯搗丸重一錢紅痢甘草湯下白痢薑湯下紅白痢米湯下噤口痢砂仁連肉湯下水瀉豬苓澤瀉湯下晨瀉散治老人脾虛五更泄瀉其效如神老黃米三合炒蓮肉二兩白朮乾薑各二錢木香一錢沙糖一兩共為細末每服三錢空心白湯下霍亂絞腸痧方服此方者先宜按穴刮透明礬末二三錢水調服立效香圓丸治一切氣逆不進飲食或即嘔噦神方陳極香圓皮二兩真川貝三兩去心炒黑當歸一兩五錢白通草一兩或烘或曬甜桔梗三錢陳西瓜皮一兩須隔年預備曬乾共為細末煎濃白檀香水泛為丸如梧子大每服開水送三錢大虛者酌用柿餅飯治反胃神方有人三世死於反胃者得此方愈柿餅切細雜乾飯內同蒸食不用水亦勿以他藥雜之久服自愈甘露湯專治反胃噎隔朝食暮吐曰反胃須臾即吐曰噎良久吐出曰隔干餳糖六兩在糖坊中賣頭榨者生薑四兩二味和勻搗爛作餅焙乾加炙甘草二兩同研為末每服二錢用沸湯入鹽少許調服甚效常服之快利胸膈調養脾胃能進飲食反胃簡易方甘蔗汁二碗薑汁一碗和勻溫熱隨意飲之每日三次則吐自止消痞神膏治積年惡痞至重貼兩張可消密陀僧六兩阿魏五錢羌活水紅花子各一兩穿山甲三錢香油斤許火候照常熬膏法膏成時下麝香一錢用布照痞大小攤貼雞金散治臌脹如神雞內金一具沉香砂仁各三錢陳香櫞五錢去核共為末每服一錢五分薑湯下水臌方地枯蔞即蘿蔔生於術各等分煎湯服蟾砂散治氣臌神方大蟾蟆一個砂仁不拘多少為末將砂仁裝入蟆內令滿縫口用泥周身封固炭火煅紅候冷將蟆研末作三服陳皮湯送下俟下氣一通為效二三服全愈此方殺生救命不可輕用不得已用之須立願多放生命為是葫蘆散治腹脹黃腫切頸葫蘆連子燒存性為末每服一個食前溫酒下或白湯下十餘日見效獨妙丹治黃疸奇方毛腳芹搗爛塗男左女右臂大肉上用蜆子殼蓋定絹扎牢起小泡即愈忌食發物大葷一月茵陳菜治疸聖藥茵陳蒿或作菜或作羹或蒸麥飯日日食之三五日愈茵陳新者切細乾者為末煮薑湯食之輪迴酒專治吐血不止用足紋銀約五六錢重放碗底早起小便如色黃者不可用先吃白糖湯一碗少頃便成純白去頭尾撒在碗內乘熱飲下數日後即便止矣忌酒酸辣煎炒等物能永戒更妙愈後將銀傾化已輕而奇臭蓋溺騷氣被紋銀收去也吐血除根奇方真童子雞一隻男用雌女用雄先擇無人走動處掘一地潭用竹刀將雞在潭內殺之血滴潭中干撏毛剖開腸雜收拾乾淨毛屎亦放潭中不可狼藉一點俱不可經勺水只用乾布拭淨肚內用六月雪草每病人一歲摘頭一個同腸雜仍放在肚內將新淨平底瓦缽一個以雞放入蓋好用麵糊封口放干灶鍋內亦蓋好封固燒柴草把三個約緩熱茶時許取出雞已熟矣去六月雪空口淡吃一頓淨盡將雞骨亦放潭內泥蓋捶結重物壓住永不可開重病吃兩次可除根勿以草把三個隔鍋缽乾燒為疑已試過果然白鳳膏治久虛發熱咳嗽吐痰咳血火乘金位者黑嘴白鴨一隻取血入溫酒量飲使直入肺金以潤補之將鴨干撏去毛脅下開竅去腸拭淨入大棗二升去核參苓平胃散一升銼碎紮好沙鍋內用炭火慢煨將陳煮酒一瓶作三次添入以干為度取起食鴨及棗或搗丸服烏雞丸治男婦血氣虛勞咳嗽吐血骨蒸潮熱夢遺失精赤白帶下人參三兩或以西黨參四兩代之亦可大生地三兩忌鐵酒炒大熟地三兩忌鐵酒炒青蒿子三兩四制香附三兩炙鱉甲三兩白朮二兩土炒棗仁二兩炒黑枸杞子二兩酒炒大麥冬二兩去心烘脆白茯苓二兩曬脆地骨皮二兩丹皮一兩五錢酒炒大白芍二兩酒炒白歸身二兩酒炒黑川芎一兩酒炒炙甘草一兩上藥如法制好磨為細末用白毛烏骨雞一隻男用雌女用雄約重一斤外者悶絕去毛竹刀破開去腸雜並去頭翅足煮極爛取出骨新瓦上炙脆研細末和入藥末內即用雞湯酌和搗千椎為丸如椒子大空心淡鹽湯下三四錢血餘散治血症妙藥少壯人頭髮水洗淨曬乾火燒熄存性絹包煎湯服之治鼻血不止方用煮酒頓熱將兩足浸入俟溫洗之即止酒可用二三次用畢傾入河內服後煎方鼻血不止煎方真犀角尖一錢五分鎊細生地四錢粉丹皮三錢白芍一錢五分炒上藥四味煎湯服重者四五劑自平煮豬腸治便血木耳不拘多少入淨豬腸內煮食自愈治腸紅方石木耳瓦上炙存性研末每服二錢開水送下常服除根柿餅丸治腸風下血棉花核炒黑去殼三兩側柏葉炒黑四兩槐米炒一兩柿餅蒸爛搗丸清晨滾湯下四五錢車蓮飲治溺血屢驗旱蓮草車前草搗汁各半茶杯和勻空心溫服如無鮮者各用三錢煎濃湯服橄欖膏治癲癡立效兼治肝火上逆之症橄欖十斤砂鍋內煮數滾去核入石臼搗爛仍入原湯煎膩出汁易水再煎煎至無味去渣以汁共歸一鍋煎濃成膏用白明礬八錢研細入膏和勻每日早晚各取膏三錢開水送服或初起輕者取橄欖咬破一頭蘸礬末入口味美易食至愈乃止橘餅湯除嗝止消橘餅細嚼滾水過下勿以易而忽之清濁飲赤白濁秘方木通七錢滑石三錢粉甘草四錢蔓荊子一錢水煎空心服立止二仙飲治溺時痛如刺甘草木通各一兩水煎空心服愈隔蔥熨臍法治二便不通蔥白頭一斤搗爛炒熱以布勻兩包更換互熨臍下立通治頭風神方冬桑葉一兩黃菊花五錢黑山梔三錢獨活一錢明天麻一錢煎滾熏洗患處避風立愈加秦艽一錢更妙頭風痛膏方此病甚則害眼左痛貼右太陽右痛貼左太陽兩首痛俱貼青黛決明子黃連黃芩桑葉歸身紅花細生地防風紫蘇葉加川貝母去心各等分除青黛外為粗末油煎用硃砂十分之三紅丹十分之七同青黛末收膏青布攤貼再另用黃菊花曬乾為細末收貯用時將菊花末少許摻膏上貼之熨衣方治骨內風寒濕氣川烏草烏南星等分為末視疼處大小每藥五錢配廣膠一兩薑汁一鍾盛瓷碗內蓋好綿紙封口入鍋中頓化調勻敷疼處鋪舊衣數層熨斗火運之能飲者儘量飲熨時覺癢即愈重者再熨以效為度二妙湯洗法治一切風痹癱瘓筋骨疼痛並大麻惡風無不神效甘草威靈仙各切片一斤水約擔外將藥煎五六滾入大缸內用板凳坐其中周圍用席圈定熏之待水溫方浸洗令渾身汗透淋漓謹避風寒即愈治面上瘋方螞蟻草不拘多少搗爛俟睡時塗患處四五夜可愈兼治火丹此草多生城垣及牆階間葉如豆瓣對節治風疹塊方白雞冠花煎水洗之愈金蟾酒治大麻風全身腫爛頭髮眉毛俱脫落而腐爛立效大蝦蟆一隻用泥裹煨熟去泥以大碗盛蟆小碗蓋住沖熱黃酒再隔水煮一刻只服酒取汗為度前有二妙湯洗法亦可兼用癘風煎此方神驗千金不易桑皮大黃芒硝各一撮水煎無風處日洗一二次如有蟲加鴿屎同煎如爛用琥珀末搽患處洗癘風惡瘡便方浮萍草或地膚子煎湯日洗俱效六黑丸專治虛目疾夜明砂望月砂晚蠶砂野馬料豆另研各四兩真徽州黑芝麻八兩俱勿見火曬乾研末用大黑棗子八兩煮爛去皮核連湯搗和為丸每朝用開水送服二錢豬肝方治夜不見物名曰雞宿眼不落水豬肝割一方塊飯鍋上蒸熟露一宿明晨淡冷食食六七日愈弦爛風赤眼洗方其效如神制以施人價廉功倍陰德甚大五倍子炒黃連去淨毛防風荊芥穗各五錢苦參四錢銅綠五分為細末以薄荷煎湯丸如彈子大以熱水化開乘熱洗眼冷則重湯溫之日洗三次爛眼皮方爐甘石三錢小川連一錢五分天花粉三錢共為極細末以磨油調勻候臥熟後輕輕敷之或以川連花粉煎濃汁制爐甘石研極細用亦可眼藥方治肝虛生障爐甘石一錢天花粉一錢小川連五分木賊草三錢穀精子一錢煎濃湯收成膏點眸子畔每日三次眼內堆起肉翳方向屠家多取豬鼻頭上尖沿邊一道皮煅研為末用好黃酒每早服三錢兩三日退淨眼中起星不消方頂高丁香二分研末黑棗一枚去皮核同搗為丸蠶豆大如左目有星塞右鼻右塞左鼻自清晨塞至夜星斗上時去之如未退淨次日再用一丸治拳毛倒睫神方木鱉子一個去殼為末綿裹塞鼻中左眼塞右右眼塞左一二夜其睫即分上下切不可摘去毛摘後重出毛硬而更拳將為終身之累治時行赤眼熏洗方當歸黃連紅花桃仁各二錢膽礬三錢皮硝五錢水三碗煎三四沸連渣傾入瓷盆